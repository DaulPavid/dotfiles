# tmux 3.x

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm*:smcup@:rmcup@"

set -s escape-time 0
set -g focus-events on
set -g history-limit 100000
set -g display-time 2000
set -g status-interval 5

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g set-titles on
setw -g aggressive-resize on

setw -g monitor-activity on
set -g visual-activity off

setw -g mode-keys vi
set -g status-keys vi

set -g prefix C-a
unbind C-b
bind C-a last-window
bind a send-prefix

bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

bind v split-window -h -c "#{pane_current_path}"
bind b split-window    -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window
bind C-f command-prompt -p find-session 'switch-client -t %%'

# clipboard via OSC 52 (works over ssh, no xclip)
set -g set-clipboard on
set -g mouse on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
bind p paste-buffer

# status bar (Base16 OneDark)
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#282c34,fg=#abb2bf"

set -g status-left-length 40
set -g status-left "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#282c34,fg=#61afef] "

set -g status-right-length 80
set -g status-right "#[fg=#56b6c2]#H #[fg=#545862]| #[fg=#98c379]%Y-%m-%d #[fg=#e5c07b]%H:%M "

setw -g window-status-format "#[fg=#545862] #I:#W "
setw -g window-status-current-format "#[bg=#3e4451,fg=#e5c07b,bold] #I:#W "
setw -g window-status-activity-style "fg=#e06c75"

set -g pane-border-style "fg=#3e4451"
set -g pane-active-border-style "fg=#61afef"
set -g message-style "bg=#3e4451,fg=#abb2bf"
set -g mode-style "bg=#61afef,fg=#282c34"
